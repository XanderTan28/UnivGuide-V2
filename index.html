<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Guidebook</title>
  <meta
    name="description"
    content="University Guidebook 本科项目数据库：支持大学展示、项目检索、筛选、排序与项目展开查看。"
  />
  <link rel="stylesheet" href="./app/css/main.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero">
      <h1>大学指南</h1>
      <button
        id="themeToggleBtn"
        class="theme-toggle"
        type="button"
        aria-label="切换主题"
        title="切换主题"
      >
        ◐
      </button>
    </header>

    <main class="page">
      <!-- 搜索 -->
      <section class="search-panel panel">
        <div class="panel__body">
          <label class="search-box" for="searchInput">
            <span class="search-box__label">搜索</span>
            <input
              id="searchInput"
              class="search-box__input"
              type="text"
              placeholder="搜索大学 / 项目 / 学院 / 学院大类 / 校区 / 城市 / 国家"
              autocomplete="off"
            />
          </label>
        </div>
      </section>

      <!-- 筛选 -->
      <section class="filters-panel panel">
        <div class="panel__head">
          <h2 class="panel__title">筛选</h2>
          <div class="panel__tools">
            <button id="resetFiltersBtn" class="btn btn--secondary" type="button">
              重置筛选
            </button>
          </div>
        </div>

        <div class="panel__body">
          <div class="filter-grid">
            <div class="filter-field">
              <label for="cityScaleSelect">城市规模</label>
              <div id="cityScaleSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="climateSelect">气候</label>
              <div id="climateSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="languageSelect">语言环境</label>
              <div id="languageSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="residencySelect">居留</label>
              <div id="residencySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="regionSelect">地区</label>
              <div id="regionSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="countrySelect">国家</label>
              <div id="countrySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="citySelect">城市</label>
              <div id="citySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="schoolSelect">大学</label>
              <div id="schoolSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="campusSelect">校区</label>
              <div id="campusSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="facultySelect">学院大类</label>
              <div id="facultySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="durationSelect">学制</label>
              <div id="durationSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="typeSelect">类型</label>
              <div id="typeSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="engTaughtSelect">授课语言</label>
              <div id="engTaughtSelect" class="filter-dropdown-host"></div>
            </div>
          </div>

          <div id="activeFilterTags" class="active-tags"></div>
        </div>
      </section>

      <!-- 数据看板 -->
      <section class="dashboard-grid">
        <article class="panel">
          <div class="panel__head">
            <h2 class="panel__title">地区</h2>
          </div>
          <div class="panel__body">
            <div id="regionStats" class="stats-list"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel__head">
            <h2 class="panel__title">城市规模</h2>
          </div>
          <div class="panel__body">
            <div id="cityScaleStats" class="stats-list"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel__head">
            <h2 class="panel__title">气候</h2>
          </div>
          <div class="panel__body">
            <div id="climateStats" class="stats-list"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel__head">
            <h2 class="panel__title">语言环境</h2>
          </div>
          <div class="panel__body">
            <div id="languageStats" class="stats-list"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel__head">
            <h2 class="panel__title">居留</h2>
          </div>
          <div class="panel__body">
            <div id="residencyStats" class="stats-list"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel__head">
            <h2 class="panel__title">学院大类</h2>
          </div>
          <div class="panel__body">
            <div id="facultyGroupStats" class="stats-list"></div>
          </div>
        </article>
      </section>

      <!-- 排序 -->
      <section class="sort-panel panel">
        <div class="panel__head sort-panel__head">
          <div class="sort-panel__heading">
            <h2 class="panel__title">排序</h2>
            <div id="resultCount" class="sort-panel__summary">0 所大学 / 0 个项目</div>
          </div>

          <div class="sort-bar__right">
            <div class="sort-field">
              <label for="sortMetricSelect">排序指标</label>
              <div id="sortMetricSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="sort-field sort-field--direction">
              <label for="sortDirectionToggle">方向</label>
              <div id="sortDirectionToggle" class="sort-direction-toggle-host"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- 加权评分器 -->
      <section class="score-panel panel">
        <div class="panel__head score-panel__head">
          <div class="score-panel__heading">
            <h2 class="panel__title">加权评分器</h2>
            <div id="scorePanelSummary" class="score-panel__summary">
              仅对学校总分生效，权重为 0 表示不参与评分
            </div>
          </div>

          <div class="score-panel__tools">
            <button id="clearScoreWeightsBtn" class="btn btn--secondary" type="button">
              清零权重
            </button>
          </div>
        </div>

        <div class="panel__body">
          <div id="scoreWeightGrid" class="score-weight-grid"></div>
        </div>
      </section>

      <!-- 主表 -->
      <section class="table-panel panel">
        <div class="panel__head">
          <h2 class="panel__title">本科项目明细表</h2>
        </div>

        <div class="panel__body">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>排位</th>
                  <th>大学</th>
                  <th>项目</th>
                  <th>学院</th>
                  <th>校区</th>
                  <th>城市</th>
                  <th>国家</th>
                  <th>地区</th>
                  <th>学制</th>
                  <th>英授</th>
                  <th>类型</th>
                  <th>QS</th>
                  <th>THE</th>
                  <th>US News</th>
                  <th>总分</th>
                </tr>
              </thead>
              <tbody id="programTableBody">
                <!-- render.js 注入 -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 地区信息弹窗 -->
  <dialog id="locationDetailDialog" class="detail-dialog">
    <div class="detail-dialog__shell">
      <div class="detail-dialog__header detail-dialog__header--close-only">
        <button
          id="closeLocationDetailBtn"
          type="button"
          class="detail-dialog__close"
          aria-label="关闭"
        >
          ×
        </button>
      </div>

        <div id="locationDetailBody" class="detail-dialog__body"></div>
    </div>
  </dialog>

  <script type="module" src="./app/js/main.js"></script>
</body>
</html>
