<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Guidebook</title>
  <meta
    name="description"
    content="University Guidebook 本科项目数据库：支持大学展示、项目检索、筛选、排序、评分与项目展开查看。"
  />
  <link rel="stylesheet" href="./app/css/main.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <a class="brand-lockup" href="./" aria-label="University Guidebook 首页">
        <span class="brand-lockup__title">大学指南</span>
        <span class="brand-lockup__subtitle">University Guidebook</span>
      </a>

      <div class="header-search">
        <label class="search-box" for="searchInput">
          <span class="search-box__label">搜索</span>
          <input
            id="searchInput"
            class="search-box__input"
            type="text"
            placeholder="搜索大学 / 项目 / 学院 / 校区 / 城市 / 国家"
            autocomplete="off"
          />
        </label>
      </div>

      <div class="header-actions">
        <nav class="header-nav" aria-label="主导航">
          <a href="#favorites">收藏</a>
        </nav>

        <button
          id="themeToggleBtn"
          class="theme-toggle"
          type="button"
          aria-label="切换主题"
          title="切换主题"
        >
          ◐
        </button>
      </div>
    </header>

    <main class="page">
      <section class="filter-toolbar panel" aria-labelledby="filterToolbarTitle">
        <div class="panel__head filter-toolbar__head">
          <div>
            <h2 id="filterToolbarTitle" class="panel__title">筛选</h2>
            <p class="panel__subtitle">按地点、学校、学院与项目属性收窄结果</p>
          </div>
          <div class="panel__tools">
            <button id="resetFiltersBtn" class="btn btn--secondary" type="button">
              清空筛选
            </button>
          </div>
        </div>

        <div class="panel__body">
          <div class="filter-grid">
            <div class="filter-field">
              <label for="cityScaleSelect">城市规模</label>
              <div id="cityScaleSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="climateSelect">气候</label>
              <div id="climateSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="languageSelect">语言环境</label>
              <div id="languageSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="residencySelect">居留</label>
              <div id="residencySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="regionSelect">地区</label>
              <div id="regionSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="countrySelect">国家</label>
              <div id="countrySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="citySelect">城市</label>
              <div id="citySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="schoolSelect">大学</label>
              <div id="schoolSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="campusSelect">校区</label>
              <div id="campusSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="facultySelect">学院大类</label>
              <div id="facultySelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="durationSelect">学制</label>
              <div id="durationSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="typeSelect">类型</label>
              <div id="typeSelect" class="filter-dropdown-host"></div>
            </div>

            <div class="filter-field">
              <label for="engTaughtSelect">授课语言</label>
              <div id="engTaughtSelect" class="filter-dropdown-host"></div>
            </div>
          </div>

          <div id="activeFilterTags" class="active-tags"></div>
        </div>
      </section>

      <section class="content-shell" aria-label="结果与辅助模块">
        <div class="content-main">
          <section class="dashboard-panel" aria-label="结果总览与统计">
          <div class="dashboard-main-column">
            <section class="overview-panel panel" aria-labelledby="overviewPanelTitle">
              <div class="panel__head">
                <h2 id="overviewPanelTitle" class="panel__title">结果总览</h2>
              </div>
              <div class="panel__body">
                <div class="overview-metrics">
                  <div class="overview-metric">
                    <span class="overview-metric__value" id="overviewSchoolCount">0</span>
                    <span class="overview-metric__label">所大学</span>
                  </div>
                  <div class="overview-metric">
                    <span class="overview-metric__value" id="overviewProgramCount">0</span>
                    <span class="overview-metric__label">个项目</span>
                  </div>
                </div>
              </div>
            </section>

            <article class="stats-card stats-card--faculty panel">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title">学院大类</h2>
                  <p class="panel__subtitle">学院大类分布</p>
                </div>
              </div>
              <div class="panel__body">
                <div id="facultyGroupStats" class="stats-list"></div>
              </div>
            </article>
          </div>

          <section class="stats-panel" aria-label="统计分布">
            <article class="stats-card panel">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title">地区</h2>
                  <p class="panel__subtitle">地区分布</p>
                </div>
              </div>
              <div class="panel__body">
                <div id="regionStats" class="stats-list"></div>
              </div>
            </article>

            <article class="stats-card panel">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title">城市规模</h2>
                  <p class="panel__subtitle">城市规模分布</p>
                </div>
              </div>
              <div class="panel__body">
                <div id="cityScaleStats" class="stats-list"></div>
              </div>
            </article>

            <article class="stats-card panel">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title">气候</h2>
                  <p class="panel__subtitle">气候分布</p>
                </div>
              </div>
              <div class="panel__body">
                <div id="climateStats" class="stats-list"></div>
              </div>
            </article>

            <article class="stats-card panel">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title">语言环境</h2>
                  <p class="panel__subtitle">语言环境分布</p>
                </div>
              </div>
              <div class="panel__body">
                <div id="languageStats" class="stats-list"></div>
              </div>
            </article>

            <article class="stats-card panel">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title">居留</h2>
                  <p class="panel__subtitle">居留友好度分布</p>
                </div>
              </div>
              <div class="panel__body">
                <div id="residencyStats" class="stats-list"></div>
              </div>
            </article>

          </section>
          </section>

      <section class="school-table-section panel" aria-labelledby="schoolTableTitle">
        <div class="table-sort-row" aria-labelledby="sortToolbarTitle">
          <h2 id="sortToolbarTitle" class="panel__title">排序</h2>
          <div class="sort-field">
            <label class="sr-only" for="sortMetricSelect">排序指标</label>
            <div id="sortMetricSelect" class="filter-dropdown-host"></div>
          </div>

          <div class="sort-field sort-field--direction">
            <label class="sr-only" for="sortDirectionToggle">方向</label>
            <div id="sortDirectionToggle" class="sort-direction-toggle-host"></div>
          </div>

          <div id="resultCount" class="sort-panel__summary">0 所大学 / 0 个项目</div>
        </div>

        <div class="panel__head">
          <div>
            <h2 id="schoolTableTitle" class="panel__title">本科项目明细表</h2>
            <p class="panel__subtitle">点击学校总行展开项目分行</p>
          </div>
        </div>

        <div class="panel__body">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>大学</th>
                  <th>地点</th>
                  <th>排名</th>
                  <th>总分</th>
                </tr>
              </thead>
              <tbody id="programTableBody">
                <!-- render.js 注入 -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
        </div>

        <aside class="content-side" aria-label="辅助模块">
          <div id="contentSideInner" class="content-side-inner">
        <section class="scoring-sidebar panel" aria-labelledby="scoringSidebarTitle">
          <div class="panel__head score-panel__head">
            <div class="score-panel__heading">
              <h2 id="scoringSidebarTitle" class="panel__title">加权评分器</h2>
              <div id="scorePanelSummary" class="score-panel__summary">
                仅对学校总分生效，权重为 0 表示不参与评分。
              </div>
            </div>

            <div class="score-panel__tools">
              <button id="clearScoreWeightsBtn" class="btn btn--secondary" type="button">
                重置
              </button>
              <button id="recommendedScoreWeightsBtn" class="btn btn--secondary" type="button">
                推荐权重
              </button>
            </div>
          </div>

          <div class="panel__body">
            <div id="scoreWeightGrid" class="score-weight-grid"></div>
            <div id="scoreWeightStatus" class="score-weight-status" aria-live="polite"></div>
          </div>
        </section>

            <section
              id="locationScenePanel"
              class="location-scene-panel panel"
              aria-labelledby="locationSceneTitle"
            >
              <div class="panel__head location-scene-panel__head">
                <div>
                  <h2 id="locationSceneTitle" class="panel__title">地点</h2>
                  <p id="locationSceneSummary" class="panel__subtitle">点击表格中的城市 / 国家 / 地区查看</p>
                </div>
              </div>
              <div id="locationSceneMount" class="location-scene-mount"></div>
            </section>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <div class="floating-detail-layer" aria-live="polite">
    <dialog id="locationDetailDialog" class="detail-dialog">
      <div class="detail-dialog__shell">
        <div class="detail-dialog__header detail-dialog__header--close-only">
          <button
            id="closeLocationDetailBtn"
            type="button"
            class="detail-dialog__close"
            aria-label="关闭"
          >
            ×
          </button>
        </div>

        <div id="locationDetailBody" class="detail-dialog__body"></div>
      </div>
    </dialog>
  </div>

  <script type="module" src="./app/js/main.js"></script>
</body>
</html>
